<!DOCTYPE html>
<html>
<head>
    <title>Image MetaData Analyzer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🔍 Image MetaData Analyze</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="image" required>

        <button type="submit">
            Analyze Image
        </button>

    </form>

    {% if sha256_hash %}
    <div class="card">
        <h2>SHA-256 Hash</h2>
        <p>{{ sha256_hash }}</p>
    </div>
    {% endif %}

    {% if metadata %}
    <div class="card">
        <h2>EXIF Metadata</h2>

        <table>
            <tr>
                <th>Tag</th>
                <th>Value</th>
            </tr>

            {% for key, value in metadata.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
    {% endif %}

</div>

</body>
</html>
